<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Connexion Employé - Refu'Gest</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700&family=Quicksand:wght@500;700&display=swap" rel="stylesheet">
    <style>
        /* Petit style spécifique pour centrer le formulaire */
        .login-container {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 80vh;
        }
        .login-box {
            background: white;
            padding: 2rem;
            border-radius: 15px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            width: 100%;
            max-width: 400px;
            text-align: center;
        }
        .login-box input {
            width: 100%;
            padding: 10px;
            margin: 10px 0;
            border: 1px solid #ddd;
            border-radius: 5px;
        }
        .error-msg {
            color: #dc3545;
            background-color: #f8d7da;
            padding: 10px;
            border-radius: 5px;
            margin-bottom: 15px;
            font-size: 0.9rem;
        }
    </style>
</head>
<body class="login-page"> <nav class="navbar">
        <div class="logo">🐾 Refu'Gest <span style="font-size: 0.8rem; color: #666;">(Accès Privé)</span></div>
        <div class="nav-links">
            <a href="/">Retour au site public</a>
        </div>
    </nav>

    <div class="login-container">
        <div class="login-box">
            <h2 style="margin-bottom: 1.5rem;">Identification</h2>
            
            {% if error %}
                <div class="error-msg">{{ error }}</div>
            {% endif %}

            <form action="/login" method="POST">
                <input type="text" name="login" placeholder="Identifiant (ex: jdupont)" required>
                <input type="password" name="password" placeholder="Mot de passe" required>
                <br><br>
                <button type="submit" class="btn-primary" style="width: 100%;">Se connecter</button>
            </form>
        </div>
    </div>

</body>
</html>
